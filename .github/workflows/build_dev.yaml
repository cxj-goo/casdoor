name: Build Offline Go Module Cache

on:
  workflow_dispatch:

jobs:
  build-offline-cache:
    runs-on: ubuntu-latest

    steps:
      # 1. 拉取仓库源码
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 拉取 Ubuntu 20.04 镜像并运行容器
      - name: Run Ubuntu 20.04 container
        uses: addnab/docker-run-action@v3
        with:
          image: ubuntu:20.04
          options: >
            -v ${{ github.workspace }}:/workspace
            -e DEBIAN_FRONTEND=noninteractive
            -e GOPROXY=https://proxy.golang.org,direct
            -e GOSUMDB=sum.golang.org
          run: |
            # 安装基础工具
            apt-get update && apt-get install -y --no-install-recommends \
              ca-certificates curl git wget tar xz-utils build-essential

            # 安装 Go 1.25.0
            GO_VERSION=1.25.0
            curl -fSL "https://go.dev/dl/go${GO_VERSION}.linux-amd64.tar.gz" -o go.tar.gz
            tar -C /usr/local -xzf go.tar.gz
            rm go.tar.gz
            export PATH=$PATH:/usr/local/go/bin

            # 验证安装
            go version

            # 设置 Go 环境变量
            export GOPATH=/root/go
            export GOMODCACHE=/root/go/pkg/mod
            mkdir -p $GOMODCACHE

            # 进入项目目录并下载依赖
            cd /workspace
            go mod download -x

            # 显示下载的模块信息
            echo "=== Go Modules Downloaded ==="
            go list -m all | head -50
            echo "=== Module Cache Size ==="
            du -sh $GOMODCACHE

            # 将模块缓存打包
            cd /root/go/pkg
            tar -czf /workspace/go-mod-cache.tar.gz mod/

      # 3. 上传模块缓存压缩包为 Artifact（30天保留）
      - name: Upload Go module cache artifact
        uses: actions/upload-artifact@v4
        with:
          name: go-mod-cache
          path: go-mod-cache.tar.gz
          retention-days: 30

      # 4. 输出使用说明
      - name: Print usage instructions
        run: |
          echo "=========================================="
          echo " Go 模块缓存已打包完成！"
          echo "=========================================="
          echo ""
          echo "📦 下载 Artifact 后，在离线 Ubuntu 20.04 机器上执行以下步骤："
          echo ""
          echo "1. 安装 Go 1.25.0（与构建环境一致）："
          echo "   wget https://go.dev/dl/go1.25.0.linux-amd64.tar.gz"
          echo "   sudo tar -C /usr/local -xzf go1.25.0.linux-amd64.tar.gz"
          echo "   echo 'export PATH=\$PATH:/usr/local/go/bin' >> ~/.bashrc"
          echo "   source ~/.bashrc"
          echo ""
          echo "2. 解压模块缓存到正确位置："
          echo "   mkdir -p ~/go/pkg"
          echo "   tar -xzf go-mod-cache.tar.gz -C ~/go/pkg/"
          echo ""
          echo "3. 复制项目源码到目标机器，然后进入项目目录："
          echo "   cd /path/to/your/project"
          echo ""
          echo "4. 设置 GOPROXY=off 使用本地缓存编译："
          echo "   export GOPROXY=off"
          echo "   go build -o myapp ."
          echo ""
          echo "=========================================="
